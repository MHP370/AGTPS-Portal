PassEnv AGTPS_SSO_SHARED_SECRET

<VirtualHost *:80>
    ServerName portal.agtps.net
    ProxyPreserveHost On

    <Location "/identity">
        AuthType GSSAPI
        AuthName "AGTPS Windows Login"
        GssapiCredStore keytab:/var/lib/agtps/portal.keytab
        GssapiAllowedMech krb5
        Require valid-user

        RequestHeader set X-Authenticated-User "expr=%{REMOTE_USER}"
        RequestHeader set X-Agtps-Sso-Secret "expr=%{reqenv:AGTPS_SSO_SHARED_SECRET}"
        RequestHeader unset Authorization
    </Location>

    <Location "/login">
        AuthType GSSAPI
        AuthName "AGTPS Windows Login"
        GssapiCredStore keytab:/var/lib/agtps/portal.keytab
        GssapiAllowedMech krb5
        Require valid-user

        RequestHeader set X-Authenticated-User "expr=%{REMOTE_USER}"
        RequestHeader set X-Agtps-Sso-Secret "expr=%{reqenv:AGTPS_SSO_SHARED_SECRET}"
        RequestHeader unset Authorization
    </Location>

    ProxyPass        /identity http://api:3002/api/auth/windows/identity
    ProxyPassReverse /identity http://api:3002/api/auth/windows/identity
    ProxyPass        /login http://api:3002/api/auth/windows/login
    ProxyPassReverse /login http://api:3002/api/auth/windows/login

    ErrorLog ${APACHE_LOG_DIR}/sso-error.log
    CustomLog ${APACHE_LOG_DIR}/sso-access.log combined
</VirtualHost>
