name: agtps-portal

networks:
  agtps-network:
    driver: bridge

volumes:
  postgres-data:
  portal-uploads:
  portal-backups:

services:
  postgres:
    image: postgres:17
    container_name: agtps-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB}
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 10s
      timeout: 5s
      retries: 8
    networks:
      - agtps-network

  api:
    build:
      context: ..
      dockerfile: docker/api.Dockerfile
    container_name: agtps-api
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      PORT: 3002
      DATABASE_URL: postgresql://${POSTGRES_USER}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB}?schema=public
      JWT_SECRET: ${JWT_SECRET}
      DIRECT_COMMUNICATION_ENCRYPTION_KEY: ${DIRECT_COMMUNICATION_ENCRYPTION_KEY}
      DIRECT_COMMUNICATION_MESSAGING_ENABLED: ${DIRECT_COMMUNICATION_MESSAGING_ENABLED:-true}
      VAPID_PUBLIC_KEY: ${VAPID_PUBLIC_KEY}
      VAPID_PRIVATE_KEY: ${VAPID_PRIVATE_KEY}
      VAPID_SUBJECT: ${VAPID_SUBJECT}
      BACKUP_DIR: /var/lib/agtps/backups
      PORTAL_URL: ${PORTAL_URL:-http://localhost}
    volumes:
      - portal-uploads:/app/apps/web/public/uploads
      - portal-backups:/var/lib/agtps/backups
      - ${FILE_SHARES_ROOT:-./file-shares}:/mnt/file-shares
    networks:
      - agtps-network

  web:
    build:
      context: ..
      dockerfile: docker/web.Dockerfile
      args:
        NEXT_PUBLIC_API_URL: ${NEXT_PUBLIC_API_URL:-/api}
    container_name: agtps-web
    restart: unless-stopped
    depends_on:
      - api
    environment:
      NEXT_PUBLIC_API_URL: ${NEXT_PUBLIC_API_URL:-/api}
    volumes:
      - portal-uploads:/app/apps/web/public/uploads
    networks:
      - agtps-network

  nginx:
    image: nginx:1.28-alpine
    container_name: agtps-nginx
    restart: unless-stopped
    depends_on:
      - web
      - api
    ports:
      - "${NGINX_PORT:-80}:80"
    volumes:
      - ./nginx:/etc/nginx/conf.d:ro
    networks:
      - agtps-network
