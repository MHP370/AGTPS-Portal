name: agtps-portal

networks:
  agtps-network:
    driver: bridge

volumes:
  postgres-data:
  redis-data:

services:

  nginx:
    image: nginx:1.28-alpine
    container_name: agtps-nginx
    restart: unless-stopped
    ports:
      - "${NGINX_PORT}:80"
    volumes:
      - ./nginx:/etc/nginx/conf.d
    networks:
      - agtps-network

  postgres:
    image: postgres:17
    container_name: agtps-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB}
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    volumes:
      - postgres-data:/var/lib/postgresql/data
    networks:
      - agtps-network

  redis:
    image: redis:8-alpine
    container_name: agtps-redis
    restart: unless-stopped
    command: redis-server --appendonly yes
    volumes:
      - redis-data:/data
    networks:
      - agtps-network
