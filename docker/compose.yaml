name: agtps-portal

networks:
  agtps-network:
    driver: bridge

volumes:
  postgres-data:
  portal-uploads:
  portal-backups:
  training-cache:

services:
  postgres:
    image: postgres:17
    container_name: agtps-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB}
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 10s
      timeout: 5s
      retries: 8
    networks:
      - agtps-network

  api:
    build:
      context: ..
      dockerfile: docker/api.Dockerfile
    container_name: agtps-api
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      PORT: 3002
      DATABASE_URL: postgresql://${POSTGRES_USER}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB}?schema=public
      JWT_SECRET: ${JWT_SECRET}
      DIRECT_COMMUNICATION_ENCRYPTION_KEY: ${DIRECT_COMMUNICATION_ENCRYPTION_KEY}
      DIRECT_COMMUNICATION_MESSAGING_ENABLED: ${DIRECT_COMMUNICATION_MESSAGING_ENABLED:-true}
      VAPID_PUBLIC_KEY: ${VAPID_PUBLIC_KEY}
      VAPID_PRIVATE_KEY: ${VAPID_PRIVATE_KEY}
      VAPID_SUBJECT: ${VAPID_SUBJECT}
      BACKUP_DIR: /var/lib/agtps/backups
      PORTAL_URL: ${PORTAL_URL:-http://localhost}
      KRB5_CONFIG: /etc/krb5.conf
      KRB5_KTNAME: /etc/krb5.keytab
      KERBEROS_SERVICE_PRINCIPAL: ${KERBEROS_SERVICE_PRINCIPAL:-HTTP/portal.agtps.net@AGTPS.NET}
      KERBEROS_SYNC_USERNAME: ${KERBEROS_SYNC_USERNAME:-svc-agtps-portal}
      SSO_SHARED_SECRET: ${SSO_SHARED_SECRET}
      TRAINING_CACHE_DIR: /var/cache/agtps/training
    dns:
      - ${AD_DNS_SERVER:-172.16.16.5}
    dns_search:
      - ${AD_DNS_SEARCH_DOMAIN:-agtps.net}
    volumes:
      - portal-uploads:/app/apps/web/public/uploads
      - portal-backups:/var/lib/agtps/backups
      - ${FILE_SHARES_ROOT:-./file-shares}:/mnt/file-shares
      - /etc/krb5.conf:/etc/krb5.conf:ro
      - /etc/agtps/agtps-portal.keytab:/etc/krb5.keytab:ro
      - training-cache:/var/cache/agtps/training
    networks:
      - agtps-network

  sso:
    build:
      context: ..
      dockerfile: docker/sso.Dockerfile
    container_name: agtps-sso
    restart: unless-stopped
    depends_on:
      - api
    environment:
      AGTPS_SSO_SHARED_SECRET: ${SSO_SHARED_SECRET}
      KRB5_CONFIG: /etc/krb5.conf
      KRB5_KTNAME: /var/lib/agtps/portal.keytab
    volumes:
      - /etc/krb5.conf:/etc/krb5.conf:ro
      - /etc/agtps/agtps-portal.keytab:/run/agtps/portal.keytab:ro
    networks:
      - agtps-network

  web:
    build:
      context: ..
      dockerfile: docker/web.Dockerfile
      args:
        NEXT_PUBLIC_API_URL: ${NEXT_PUBLIC_API_URL:-/api}
    container_name: agtps-web
    restart: unless-stopped
    depends_on:
      - api
    environment:
      NEXT_PUBLIC_API_URL: ${NEXT_PUBLIC_API_URL:-/api}
      INTERNAL_API_URL: http://api:3002/api
    volumes:
      - portal-uploads:/app/apps/web/public/uploads
    networks:
      - agtps-network

  nginx:
    image: nginx:1.28-alpine
    container_name: agtps-nginx
    restart: unless-stopped
    depends_on:
      - web
      - api
      - sso
    ports:
      - "${NGINX_PORT:-80}:80"
    volumes:
      - ./nginx:/etc/nginx/conf.d:ro
      - portal-uploads:/var/www/portal-uploads:ro
    networks:
      - agtps-network
